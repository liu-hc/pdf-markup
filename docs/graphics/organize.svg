<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect x="0" y="0" width="900" height="280" rx="18" fill="#eef0f8"/>

  <!-- Properties / independent colors -->
  <rect x="28" y="24" width="272" height="190" rx="12" fill="#ffffff" stroke="#e2e5f2"/>
  <rect x="48" y="42" width="232" height="30" rx="8" fill="#1d2150"/>
  <rect x="54" y="48" width="18" height="18" rx="5" fill="#4c5fe6"/>
  <text x="80" y="56" font-size="9" fill="#ffffff" font-weight="bold">callout</text>
  <text x="80" y="67" font-size="7" fill="#a9adde" letter-spacing="1">PAGE 6</text>
  <text x="52" y="94" font-size="8" fill="#979cc4" letter-spacing="1.5">APPEARANCE</text>
  <g font-size="10" fill="#5c618f">
    <text x="52" y="116">Line</text>
    <text x="52" y="140">Infill</text>
    <text x="52" y="164">Text</text>
    <text x="52" y="188">Opacity</text>
  </g>
  <rect x="226" y="106" width="42" height="14" rx="4" fill="#002060"/>
  <rect x="226" y="130" width="42" height="14" rx="4" fill="#ffff00" fill-opacity="0.5" stroke="#c9cede"/>
  <rect x="226" y="154" width="42" height="14" rx="4" fill="#c02020"/>
  <line x1="130" y1="185" x2="240" y2="185" stroke="#d5d9ea" stroke-width="3" stroke-linecap="round"/>
  <circle cx="218" cy="185" r="6" fill="#4c5fe6"/>
  <text x="164" y="242" font-size="14" fill="#1d2150" text-anchor="middle" font-weight="bold">Per-markup properties</text>
  <text x="164" y="262" font-size="10.5" fill="#5c618f" text-anchor="middle">independent line / infill / text</text>

  <!-- Markups list + draw order -->
  <rect x="316" y="24" width="272" height="190" rx="12" fill="#ffffff" stroke="#e2e5f2"/>
  <text x="340" y="52" font-size="8" fill="#979cc4" letter-spacing="1.5">MARKUPS</text>
  <g>
    <rect x="336" y="60" width="232" height="24" rx="7" fill="#eceef8"/>
    <circle cx="350" cy="72" r="4" fill="#002060"/>
    <text x="362" y="76" font-size="10" fill="#1d2150">text</text>
    <text x="556" y="76" font-size="9" fill="#979cc4" text-anchor="end">VE…VE</text>
  </g>
  <!-- drop line indicator -->
  <line x1="340" y1="92" x2="564" y2="92" stroke="#6577f7" stroke-width="3" stroke-linecap="round"/>
  <circle cx="340" cy="92" r="4.5" fill="#6577f7"/><circle cx="564" cy="92" r="4.5" fill="#6577f7"/>
  <g>
    <rect x="336" y="100" width="232" height="24" rx="7" fill="#1d2150"/>
    <circle cx="350" cy="112" r="4" fill="#2f6fe0"/>
    <text x="362" y="116" font-size="10" fill="#ffffff">rectangle</text>
    <text x="556" y="116" font-size="9" fill="#a9adde" text-anchor="end">47…m²</text>
  </g>
  <!-- floating dragged clone -->
  <g transform="rotate(-2 452 140)">
    <rect x="356" y="130" width="232" height="24" rx="7" fill="#ffffff" stroke="#4c5fe6" stroke-width="1.4"/>
    <circle cx="370" cy="142" r="4" fill="#c02020"/>
    <text x="382" y="146" font-size="10" fill="#1d2150">dimension</text>
    <text x="576" y="146" font-size="9" fill="#979cc4" text-anchor="end">24…8"</text>
  </g>
  <text x="452" y="180" font-size="10" fill="#5c618f" text-anchor="middle">drag rows to change draw order —</text>
  <text x="452" y="194" font-size="10" fill="#5c618f" text-anchor="middle">the glowing line marks the drop spot</text>
  <text x="452" y="242" font-size="14" fill="#1d2150" text-anchor="middle" font-weight="bold">Markups list</text>
  <text x="452" y="262" font-size="10.5" fill="#5c618f" text-anchor="middle">dot · type · abbreviated text</text>

  <!-- Edit actions -->
  <rect x="604" y="24" width="272" height="190" rx="12" fill="#ffffff" stroke="#e2e5f2"/>
  <g font-size="10.5" fill="#5c618f">
    <text x="628" y="58">Undo / Redo</text>
    <text x="628" y="84">Cut / Copy / Paste</text>
    <text x="628" y="110">Paste in place</text>
    <text x="628" y="136">Duplicate</text>
    <text x="628" y="162">Delete</text>
    <text x="628" y="188">Snap ortho</text>
  </g>
  <g font-size="10" fill="#1d2150" text-anchor="end" font-weight="bold">
    <text x="852" y="58">⌘Z · ⇧⌘Z</text>
    <text x="852" y="84">⌘X · ⌘C · ⌘V</text>
    <text x="852" y="110">⇧⌘V</text>
    <text x="852" y="136">⌘D</text>
    <text x="852" y="162">Del</text>
    <text x="852" y="188">Shift-drag</text>
  </g>
  <text x="740" y="242" font-size="14" fill="#1d2150" text-anchor="middle" font-weight="bold">Full editing</text>
  <text x="740" y="262" font-size="10.5" fill="#5c618f" text-anchor="middle">every gesture is one undo step</text>
</svg>
