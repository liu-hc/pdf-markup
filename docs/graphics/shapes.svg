<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect x="0" y="0" width="900" height="300" rx="18" fill="#eef0f8"/>

  <!-- Rectangle -->
  <rect x="28" y="24" width="128" height="128" rx="12" fill="#ffffff" stroke="#e2e5f2"/>
  <rect x="52" y="60" width="80" height="52" fill="#2f6fe0" fill-opacity="0.12" stroke="#002060" stroke-width="2"/>
  <text x="92" y="176" font-size="13" fill="#1d2150" text-anchor="middle" font-weight="bold">Rectangle</text>
  <text x="92" y="194" font-size="11" fill="#5c618f" text-anchor="middle">R · two clicks</text>
  <text x="92" y="210" font-size="10" fill="#979cc4" text-anchor="middle">infill · rotation</text>

  <!-- Ellipse -->
  <rect x="172" y="24" width="128" height="128" rx="12" fill="#ffffff" stroke="#e2e5f2"/>
  <ellipse cx="236" cy="86" rx="42" ry="28" fill="none" stroke="#002060" stroke-width="2"/>
  <text x="236" y="176" font-size="13" fill="#1d2150" text-anchor="middle" font-weight="bold">Ellipse</text>
  <text x="236" y="194" font-size="11" fill="#5c618f" text-anchor="middle">O · two clicks</text>
  <text x="236" y="210" font-size="10" fill="#979cc4" text-anchor="middle">Ctrl = circle</text>

  <!-- Polygon -->
  <rect x="316" y="24" width="128" height="128" rx="12" fill="#ffffff" stroke="#e2e5f2"/>
  <polygon points="352,110 344,66 380,46 416,64 408,112" fill="#00b050" fill-opacity="0.1" stroke="#00b050" stroke-width="2"/>
  <g fill="#00b050"><circle cx="352" cy="110" r="3"/><circle cx="344" cy="66" r="3"/><circle cx="380" cy="46" r="3"/><circle cx="416" cy="64" r="3"/><circle cx="408" cy="112" r="3"/></g>
  <text x="380" y="94" font-size="9.5" fill="#00b050" text-anchor="middle">2,410 sq ft</text>
  <text x="380" y="176" font-size="13" fill="#1d2150" text-anchor="middle" font-weight="bold">Polygon</text>
  <text x="380" y="194" font-size="11" fill="#5c618f" text-anchor="middle">Shift+P · vertices</text>
  <text x="380" y="210" font-size="10" fill="#979cc4" text-anchor="middle">optional area label</text>

  <!-- Cloud -->
  <rect x="460" y="24" width="128" height="128" rx="12" fill="#ffffff" stroke="#e2e5f2"/>
  <path d="M488 106 a7 7 0 0 1 0 -14 a7 7 0 0 1 2 -13 a7 7 0 0 1 8 -11 a7 7 0 0 1 12 -6 a7 7 0 0 1 13 -1 a7 7 0 0 1 13 3 a7 7 0 0 1 9 8 a7 7 0 0 1 4 12 a7 7 0 0 1 -2 13 a7 7 0 0 1 -8 10 a7 7 0 0 1 -12 4 a7 7 0 0 1 -13 1 a7 7 0 0 1 -13 -2 a7 7 0 0 1 -13 -4" fill="none" stroke="#c00000" stroke-width="2"/>
  <text x="524" y="176" font-size="13" fill="#1d2150" text-anchor="middle" font-weight="bold">Revision cloud</text>
  <text x="524" y="194" font-size="11" fill="#5c618f" text-anchor="middle">Shift on close</text>
  <text x="524" y="210" font-size="10" fill="#979cc4" text-anchor="middle">arc-scalloped edges</text>

  <!-- Line -->
  <rect x="604" y="24" width="128" height="128" rx="12" fill="#ffffff" stroke="#e2e5f2"/>
  <line x1="636" y1="116" x2="694" y2="60" stroke="#002060" stroke-width="2"/>
  <polygon points="700,54 684,62 692,70" fill="#002060"/>
  <circle cx="632" cy="120" r="3.5" fill="#002060"/>
  <text x="668" y="176" font-size="13" fill="#1d2150" text-anchor="middle" font-weight="bold">Line</text>
  <text x="668" y="194" font-size="11" fill="#5c618f" text-anchor="middle">L · Shift = ortho</text>
  <text x="668" y="210" font-size="10" fill="#979cc4" text-anchor="middle">arrowheads 25–800%</text>

  <!-- Polyline -->
  <rect x="748" y="24" width="128" height="128" rx="12" fill="#ffffff" stroke="#e2e5f2"/>
  <polyline points="772,116 792,70 820,96 850,56" fill="none" stroke="#002060" stroke-width="2"/>
  <polygon points="856,48 840,54 847,63" fill="#002060"/>
  <g fill="#002060"><circle cx="772" cy="116" r="3"/><circle cx="792" cy="70" r="3"/><circle cx="820" cy="96" r="3"/></g>
  <text x="812" y="176" font-size="13" fill="#1d2150" text-anchor="middle" font-weight="bold">Polyline</text>
  <text x="812" y="194" font-size="11" fill="#5c618f" text-anchor="middle">P · dbl-click ends</text>
  <text x="812" y="210" font-size="10" fill="#979cc4" text-anchor="middle">optional length label</text>

  <!-- Highlighter (wide card) -->
  <rect x="28" y="228" width="848" height="52" rx="12" fill="#ffffff" stroke="#e2e5f2"/>
  <g font-size="9" fill="#9297bf">
    <text x="52" y="250">Contractor to verify all dimensions on site prior to</text>
    <text x="52" y="264">fabrication. Refer to structural drawings for details.</text>
  </g>
  <rect x="48" y="240" width="252" height="14" fill="#f5c542" fill-opacity="0.45"/>
  <path d="M420 268 q60 -24 120 -8 q50 13 90 -10" fill="none" stroke="#f5c542" stroke-opacity="0.55" stroke-width="14" stroke-linecap="round"/>
  <text x="640" y="250" font-size="13" fill="#1d2150" font-weight="bold">Highlighter</text>
  <text x="640" y="266" font-size="10.5" fill="#5c618f">snaps to text · free-draws anywhere</text>
</svg>
