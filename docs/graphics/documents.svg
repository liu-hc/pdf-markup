<svg viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect x="0" y="0" width="900" height="240" rx="18" fill="#eef0f8"/>

  <!-- Open -->
  <g>
    <rect x="46" y="46" width="120" height="120" rx="12" fill="#ffffff" stroke="#e2e5f2"/>
    <path d="M86 78 h20 l6 6 h24 v40 h-50 z" fill="none" stroke="#1d2150" stroke-width="1.8" stroke-linejoin="round"/>
    <text x="106" y="146" font-size="12" fill="#1d2150" text-anchor="middle" font-weight="bold">Open</text>
    <text x="106" y="188" font-size="9.5" fill="#5c618f" text-anchor="middle">PDF · JPG · PNG</text>
    <text x="106" y="202" font-size="9.5" fill="#5c618f" text-anchor="middle">or drag &amp; drop</text>
  </g>
  <path d="M180 106 h44 m-10 -7 l10 7 l-10 7" stroke="#4c5fe6" stroke-width="2" fill="none"/>

  <!-- Mark up -->
  <g>
    <rect x="238" y="46" width="120" height="120" rx="12" fill="#ffffff" stroke="#e2e5f2"/>
    <rect x="262" y="76" width="46" height="30" fill="#2f6fe0" fill-opacity="0.15" stroke="#2f6fe0" stroke-width="1.6"/>
    <line x1="272" y1="126" x2="330" y2="96" stroke="#c02020" stroke-width="1.8"/>
    <polygon points="336,93 322,96 327,104" fill="#c02020"/>
    <text x="298" y="146" font-size="12" fill="#1d2150" text-anchor="middle" font-weight="bold">Mark up</text>
    <text x="298" y="188" font-size="9.5" fill="#5c618f" text-anchor="middle">draw · annotate</text>
    <text x="298" y="202" font-size="9.5" fill="#5c618f" text-anchor="middle">· measure</text>
  </g>
  <path d="M372 106 h44 m-10 -7 l10 7 l-10 7" stroke="#4c5fe6" stroke-width="2" fill="none"/>

  <!-- Save -->
  <g>
    <rect x="430" y="46" width="120" height="120" rx="12" fill="#ffffff" stroke="#e2e5f2"/>
    <rect x="462" y="74" width="56" height="44" rx="6" fill="#4c5fe6"/>
    <text x="490" y="101" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">⌘S</text>
    <text x="490" y="146" font-size="12" fill="#1d2150" text-anchor="middle" font-weight="bold">Save</text>
    <text x="490" y="188" font-size="9.5" fill="#5c618f" text-anchor="middle">writes into the PDF,</text>
    <text x="490" y="202" font-size="9.5" fill="#5c618f" text-anchor="middle">in place (Save As too)</text>
  </g>
  <path d="M564 106 h44 m-10 -7 l10 7 l-10 7" stroke="#4c5fe6" stroke-width="2" fill="none"/>

  <!-- Reopen editable -->
  <g>
    <rect x="622" y="46" width="120" height="120" rx="12" fill="#ffffff" stroke="#e2e5f2"/>
    <path d="M700 84 a24 24 0 1 0 6 18" fill="none" stroke="#1d2150" stroke-width="2" stroke-linecap="round"/>
    <path d="M700 70 v15 h-15" fill="none" stroke="#1d2150" stroke-width="2" stroke-linecap="round"/>
    <text x="682" y="146" font-size="12" fill="#1d2150" text-anchor="middle" font-weight="bold">Reopen</text>
    <text x="682" y="188" font-size="9.5" fill="#5c618f" text-anchor="middle">markups come back</text>
    <text x="682" y="202" font-size="9.5" fill="#5c618f" text-anchor="middle">fully editable</text>
  </g>

  <!-- Flatten branch -->
  <path d="M742 150 q40 20 60 -22" stroke="#979cc4" stroke-width="1.6" fill="none" stroke-dasharray="4 3"/>
  <g>
    <rect x="790" y="60" width="86" height="76" rx="10" fill="#1d2150"/>
    <rect x="806" y="76" width="54" height="34" fill="#ffffff"/>
    <line x1="812" y1="86" x2="854" y2="86" stroke="#c02020" stroke-width="1.4"/>
    <line x1="812" y1="98" x2="840" y2="98" stroke="#2f6fe0" stroke-width="1.4"/>
    <text x="833" y="126" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">Flatten</text>
  </g>
  <text x="833" y="158" font-size="9" fill="#5c618f" text-anchor="middle">or bake markups</text>
  <text x="833" y="171" font-size="9" fill="#5c618f" text-anchor="middle">permanently</text>

  <text x="450" y="228" font-size="10.5" fill="#5c618f" text-anchor="middle">Multiple documents open as tabs · closing prompts to save only if the document was actually edited</text>
</svg>
