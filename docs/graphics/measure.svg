<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect x="0" y="0" width="900" height="300" rx="18" fill="#eef0f8"/>

  <!-- Calibrate -->
  <rect x="28" y="24" width="272" height="180" rx="12" fill="#ffffff" stroke="#e2e5f2"/>
  <g stroke="#c9cede" stroke-width="1.2">
    <line x1="60" y1="110" x2="268" y2="110"/>
    <line x1="60" y1="98" x2="60" y2="122"/>
    <line x1="268" y1="98" x2="268" y2="122"/>
  </g>
  <line x1="60" y1="110" x2="268" y2="110" stroke="#00838f" stroke-width="2"/>
  <circle cx="60" cy="110" r="4" fill="#00838f"/>
  <circle cx="268" cy="110" r="4" fill="#00838f"/>
  <rect x="112" y="52" width="104" height="24" rx="6" fill="#1d2150"/>
  <text x="164" y="68" font-size="10.5" fill="#ffffff" text-anchor="middle">= 10'-0" ?</text>
  <line x1="164" y1="76" x2="164" y2="102" stroke="#1d2150" stroke-dasharray="3 3"/>
  <text x="164" y="146" font-size="10" fill="#5c618f" text-anchor="middle">click two points on a known span,</text>
  <text x="164" y="162" font-size="10" fill="#5c618f" text-anchor="middle">type its real length → page scale set</text>
  <text x="164" y="232" font-size="14" fill="#1d2150" text-anchor="middle" font-weight="bold">Calibrate</text>
  <text x="164" y="252" font-size="11" fill="#5c618f" text-anchor="middle">also: pick 1:100, 1/4"=1'-0" … presets</text>

  <!-- Dimension -->
  <rect x="316" y="24" width="272" height="180" rx="12" fill="#ffffff" stroke="#e2e5f2"/>
  <rect x="356" y="120" width="192" height="48" fill="none" stroke="#c9cede" stroke-width="1.4"/>
  <g stroke="#c02020" stroke-width="1.5" fill="none">
    <line x1="356" y1="112" x2="356" y2="72"/>
    <line x1="548" y1="112" x2="548" y2="72"/>
    <line x1="356" y1="80" x2="548" y2="80"/>
    <line x1="349" y1="87" x2="363" y2="73"/>
    <line x1="541" y1="87" x2="555" y2="73"/>
  </g>
  <rect x="414" y="56" width="76" height="17" fill="#ffffff"/>
  <text x="452" y="69" font-size="11" fill="#c02020" text-anchor="middle">24'-8"</text>
  <text x="452" y="146" font-size="10" fill="#5c618f" text-anchor="middle">third click pulls the line to an offset</text>
  <text x="452" y="232" font-size="14" fill="#1d2150" text-anchor="middle" font-weight="bold">Dimension · D</text>
  <text x="452" y="252" font-size="11" fill="#5c618f" text-anchor="middle">slash or arrow ends · round-up options</text>

  <!-- Angle -->
  <rect x="604" y="24" width="272" height="180" rx="12" fill="#ffffff" stroke="#e2e5f2"/>
  <g stroke="#00838f" stroke-width="2" fill="none" stroke-linecap="round">
    <line x1="664" y1="150" x2="820" y2="150"/>
    <line x1="664" y1="150" x2="788" y2="62"/>
    <path d="M744 150 a80 80 0 0 0 -14 -46"/>
  </g>
  <circle cx="664" cy="150" r="4" fill="#00838f"/>
  <text x="768" y="128" font-size="12" fill="#00838f">35.4°</text>
  <text x="740" y="232" font-size="14" fill="#1d2150" text-anchor="middle" font-weight="bold">Angle</text>
  <text x="740" y="252" font-size="11" fill="#5c618f" text-anchor="middle">three clicks measure an angle</text>

  <!-- totals strip -->
  <rect x="28" y="264" width="848" height="1" fill="#e2e5f2"/>
  <text x="450" y="288" font-size="11" fill="#5c618f" text-anchor="middle">All measurements honor the page scale — imperial ft-in formatting, with per-page Totals (linear · polyline · area) in the inspector</text>
</svg>
